# sia2mqtt configuration
#
# Format: key=value (one per line)
# Lines starting with # are comments.
# Inline comments are NOT supported — the entire value after = is used as-is.
# Boolean values accept: true/false, yes/no, on/off, 1/0

# ===========================
# SIA DC-09 Settings
# ===========================

# TCP address to listen for SIA connections from Ajax hub.
# Use ":45128" to listen on all interfaces, or "127.0.0.1:45128" for localhost only.
# This port must match what you configure in Ajax Hub → Monitoring Station → Server Port.
sia_listen=:45128

# Account ID verification — your Ajax "Object Number".
# This MUST match the Object Number configured in your Ajax hub's monitoring station
# settings. Frames from other account IDs will be silently rejected (no ACK sent).
# Leave empty to accept any account ID (not recommended).
sia_account_id=AAAA

# ===========================
# MQTT Broker Settings
# ===========================

# MQTT broker address.
# Use tcp:// for plain MQTT, or tls:// (ssl://) for MQTT over TLS.
# Examples: tcp://192.168.1.100:1883, tls://mqtt.example.com:8883
mqtt_broker=tcp://192.168.1.100:1883

# MQTT authentication (leave empty if your broker does not require auth)
mqtt_user=homeassistant
mqtt_password=your_mqtt_password

# MQTT client ID (leave empty for auto-generated unique ID per process start)
mqtt_clientid=

# Main state topic — publishes JSON: {"state":"armed","code":"CL","ts":"..."}
# A second topic "<base>/user" is derived automatically (e.g. home/alarm/ajax/user)
# by replacing the trailing "/state" segment.
mqtt_topic=home/alarm/ajax/state

# MQTT QoS level: 0 (at most once), 1 (at least once), or 2 (exactly once)
mqtt_qos=1

# Retain state messages so new subscribers get the last known state immediately
mqtt_retain=true

# ===========================
# MQTT Availability (LWT)
# ===========================

# Last Will and Testament — the broker publishes the "offline" payload if sia2mqtt
# disconnects unexpectedly. On connect, sia2mqtt publishes the "online" payload.
# Home Assistant uses this to show the device as available/unavailable.
mqtt_availability_topic=home/alarm/ajax/availability
mqtt_availability_online=online
mqtt_availability_offline=offline

# ===========================
# MQTT Home Assistant Discovery
# ===========================

# Enable MQTT auto-discovery for Home Assistant.
# When enabled, sia2mqtt publishes discovery configs for two sensors:
#   1. Alarm state sensor (disarmed/armed/night/alarm/unknown)
#   2. Last user sensor (the user ID that triggered the last arm/disarm)
# Discovery configs are re-published automatically after MQTT reconnections.
mqtt_discovery_enable=true

# Discovery prefix — must match your HA MQTT integration setting (default: homeassistant)
mqtt_discovery_prefix=homeassistant

# Node ID — used in discovery topic paths and as part of HA entity IDs
mqtt_discovery_node_id=ajax

# Object ID — combined with node_id to form the unique_id in HA
mqtt_discovery_object_id=alarm_state

# Friendly name shown in the Home Assistant UI
mqtt_discovery_name=Ajax Alarm State

# ===========================
# MQTT TLS Settings
# ===========================

# Skip TLS certificate verification when using tls:// or ssl:// broker URLs.
# Only set to true for self-signed certificates in trusted networks.
mqtt_tls_insecure_skip_verify=false

# ===========================
# HTTP Stats Server
# ===========================

# HTTP server address for health checks and runtime stats.
# Bind to 127.0.0.1 to restrict access to localhost only.
# Endpoints:
#   GET /health — returns "ok" (for load balancers / monitoring)
#   GET /state  — current alarm state as JSON
#   GET /stats  — full runtime stats (uptime, counters, MQTT status, last event)
http_listen=127.0.0.1:8080

# ===========================
# State Persistence
# ===========================

# File to save the last known alarm state. Survives restarts so the alarm state
# is not lost when the daemon is restarted. Written atomically (temp file + rename).
# The directory will be created if it doesn't exist.
state_file=/var/lib/sia2mqtt/state.json

# ===========================
# Logging
# ===========================

# Log file path. Logs are rotated automatically based on size/count/age.
# Old log files are compressed with gzip.
# Leave empty to disable file logging entirely.
log_file=/var/log/sia2mqtt/sia2mqtt.log

# Maximum log file size in MB before rotation triggers
log_max_size_mb=10

# Maximum number of rotated log files to keep (0 = keep all)
log_max_backups=5

# Maximum age in days for rotated log files (0 = no age limit)
log_max_age_days=30

# ===========================
# Debug
# ===========================

# Enable verbose logging — includes hex dumps of received frames, ACK messages sent,
# account verification details, and unhandled event codes.
# Useful for initial setup and troubleshooting. Not recommended for production.
verbose=false
